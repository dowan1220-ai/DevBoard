<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/notice.css">
    <title>공지사항</title>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <a href="/main" class="site-logo">💻 DevBoard</a>
            <span class="welcome">👋 {{ user_id }}님</span>
        </div>
        <nav class="topbar-nav">
            <a href="/recruit" class="nav-link">구인 게시판</a>
            <a href="/notice" class="nav-link active">공지사항</a>
        </nav>
        <div class="topbar-center">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="게시판·멤버 검색...">
            </div>
        </div>
        <div class="topbar-right">
            <button class="bell-btn" title="알림">🔔</button>
            <button class="darkmode-btn" title="다크모드" id="darkToggle">🌙</button>
            {% if is_admin %}
            <a href="/admin" class="admin-link-btn">🛡️ 관리자</a>
            {% endif %}
            {% if user_id == '게스트' %}
            <a href="/login_page" class="login-hint-btn">로그인이 안되어있다면?</a>
            {% else %}
            <a href="/settings" class="settings-btn">⚙️ 회원 정보 수정</a>
            <a href="/logout" class="logout-btn">로그아웃</a>
            {% endif %}
        </div>
    </div>

    <div class="notice-container">
        <div class="notice-header">
            <h2>📋 공지사항</h2>
            <p class="notice-sub">운영자가 올린 공지를 확인하세요</p>
        </div>
        <div id="noticeList">
            <div class="notice-loading">불러오는 중...</div>
        </div>
    </div>

    <!-- 공지 상세 모달 -->
    <div class="notice-modal-overlay hidden" id="noticeDetailOverlay">
        <div class="notice-detail-modal">
            <div class="notice-detail-header">
                <div class="notice-detail-meta" id="detailMeta"></div>
                <button class="notice-detail-close" id="detailClose">✕</button>
            </div>
            <h2 class="notice-detail-title" id="detailTitle"></h2>
            <div class="notice-detail-content" id="detailContent"></div>
        </div>
    </div>

    <script>
        // 다크모드
        const darkToggle = document.getElementById('darkToggle');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            darkToggle.textContent = '☀️';
        }
        darkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            darkToggle.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
        function timeStr(ts) {
            const d = new Date(ts * 1000);
            return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        // 공지 목록 로드
        async function loadNotices() {
            const list = document.getElementById('noticeList');
            try {
                const res  = await fetch('/api/notices');
                const data = await res.json();
                if (!data.notices.length) {
                    list.innerHTML = `
                        <div class="notice-empty">
                            <span class="notice-empty-icon">🔔</span>
                            <p>아직 공지사항이 없습니다</p>
                            <span class="notice-empty-sub">새로운 공지가 올라오면 여기서 확인하세요!</span>
                        </div>`;
                    return;
                }
                list.innerHTML = '';
                data.notices.forEach(n => {
                    const card = document.createElement('div');
                    card.className = `notice-card${n.is_pinned ? ' pinned' : ''}`;
                    card.innerHTML = `
                        <div class="notice-card-left">
                            ${n.is_pinned ? '<span class="notice-pin">📌 고정</span>' : ''}
                            <div class="notice-card-title">${escHtml(n.title)}</div>
                            <div class="notice-card-preview">${escHtml(n.content)}</div>
                        </div>
                        <div class="notice-card-right">
                            <span class="notice-card-author">${escHtml(n.author_nickname)}</span>
                            <span class="notice-card-date">${timeStr(n.created_at)}</span>
                        </div>
                    `;
                    card.addEventListener('click', () => openDetail(n));
                    list.appendChild(card);
                });
            } catch {
                list.innerHTML = '<div class="notice-loading">로딩 실패. 새로고침해주세요.</div>';
            }
        }

        // 공지 상세
        function openDetail(n) {
            document.getElementById('detailMeta').innerHTML =
                `${escHtml(n.author_nickname)} · ${timeStr(n.created_at)}${n.updated_at > n.created_at + 1 ? ' · (수정됨)' : ''}`;
            document.getElementById('detailTitle').textContent = n.title;
            document.getElementById('detailContent').textContent = n.content;
            document.getElementById('noticeDetailOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }
        document.getElementById('detailClose').addEventListener('click', () => {
            document.getElementById('noticeDetailOverlay').classList.add('hidden');
            document.body.style.overflow = '';
        });
        document.getElementById('noticeDetailOverlay').addEventListener('click', e => {
            if (e.target === document.getElementById('noticeDetailOverlay')) {
                document.getElementById('noticeDetailOverlay').classList.add('hidden');
                document.body.style.overflow = '';
            }
        });

        loadNotices();
    </script>
</body>
</html>
