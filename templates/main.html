<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/main.css">
    <title>홈</title>
</head>
<body>
    <div class="toast" id="toast">✅ 로그인에 성공했습니다!</div>

    <button class="scroll-top-btn" id="scrollTopBtn" title="맨 위로">⬆️</button>

    <div class="topbar">
        <div class="topbar-left">
            <a href="/main" class="site-logo">💻 DevBoard</a>
            <span class="welcome">👋 {{ user_id }}님</span>
        </div>
        <nav class="topbar-nav">
            <a href="/recruit" class="nav-link" id="navRecruit">구인 게시판<span class="new-dot hidden" id="dotRecruit"></span></a>
            <a href="/notice" class="nav-link" id="navNotice">공지사항<span class="new-dot hidden" id="dotNotice"></span></a>
        </nav>
        <div class="topbar-center">
            <div class="search-wrap" id="searchWrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="닉네임으로 검색..." id="searchInput" autocomplete="off">
                <div class="search-dropdown hidden" id="searchDropdown"></div>
            </div>
        </div>
        <div class="topbar-right">
            <div class="dm-wrap" id="dmWrap">
                <button class="dm-topbar-btn" id="dmBtn" title="DM">💬<span class="dm-unread-badge hidden" id="dmBadge"></span></button>
            </div>
            <button class="bell-btn" title="알림">🔔</button>
            <button class="darkmode-btn" title="다크모드" id="darkToggle">🌙</button>
            {% if is_admin %}
            <a href="/admin" class="admin-link-btn">🛡️ 관리자</a>
            {% endif %}
            {% if user_id == '게스트' %}
            <a href="/login_page" class="login-hint-btn">로그인이 안되어있다면?</a>
            {% else %}
            <a href="/settings" class="settings-btn">⚙️ 회원 정보 수정</a>
            <a href="/logout" class="logout-btn">로그아웃</a>
            {% endif %}
        </div>
    </div>

    <div class="content">
        <h1 class="typing-text" id="typingText"></h1>
        <div class="nav-menu">
            <a href="/recruit" class="nav-btn" id="btnRecruit">
                <span>👥</span>
                <span>구인 게시판</span>
                <span class="nav-btn-new hidden" id="btnDotRecruit">NEW</span>
            </a>
            <a href="/notice" class="nav-btn" id="btnNotice">
                <span>📋</span>
                <span>공지사항</span>
                <span class="nav-btn-new hidden" id="btnDotNotice">NEW</span>
            </a>
        </div>
        <div class="stats-section">
            <div class="stat-card">
                <span class="stat-num" id="statUsers">-</span>
                <span class="stat-label">👤 가입자</span>
            </div>
            <div class="stat-card">
                <span class="stat-num" id="statProfiles">-</span>
                <span class="stat-label">🔍 구인 등록</span>
            </div>
        </div>
    </div>
    <div class="footer-spacer"></div>
    <footer class="footer">
        <div class="footer-item">
            <span class="footer-label">버그제보</span>
            <span class="footer-link">1106김도완</span>
        </div>
        <div class="footer-item">
            <span class="footer-label">커뮤니티</span>
            <span class="footer-link">플로우</span>
        </div>
        <div class="footer-item">
            <span class="footer-label">오픈소스</span>
            <span class="footer-link">코드링크</span>
        </div>
    </footer>

    <!-- ────── DM 패널 ────── -->
    <div class="dm-panel" id="dmPanel">
        <div class="dm-panel-header">
            <button class="dm-back-btn hidden" id="dmBackBtn">←</button>
            <span class="dm-panel-title" id="dmPanelTitle">💬 메시지</span>
            <button class="dm-panel-close" id="dmPanelClose">✕</button>
        </div>
        <div class="dm-panel-body" id="dmPanelBody">
            <div class="dm-empty">대화 내용이 없습니다</div>
        </div>
        <div class="dm-input-area hidden" id="dmInputArea">
            <input type="text" class="dm-input" id="dmInput" placeholder="메시지를 입력하세요..." maxlength="500">
            <button class="dm-send-btn" id="dmSendBtn">↑</button>
        </div>
    </div>

    <script src="/static/js/dm.js"></script>
    <script>
        {% if show_toast %}
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
        {% endif %}

        // 타이핑 효과
        const texts = [
            '함께 성장하는 대구 소마고 개발자 커뮤니티',
            '같이 공부할 팀원을 찾아보세요!',
            '코딩은 혼자보다 함께!'
        ];
        let textIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const el = document.getElementById('typingText');

        function type() {
            const current = texts[textIndex];

            if (!isDeleting) {
                el.textContent = current.slice(0, charIndex + 1);
                charIndex++;
                if (charIndex === current.length) {
                    isDeleting = true;
                    setTimeout(type, 1500);   // 다 쓴 후 잠깐 대기
                    return;
                }
            } else {
                el.textContent = current.slice(0, charIndex - 1);
                charIndex--;
                if (charIndex === 0) {
                    isDeleting = false;
                    textIndex = (textIndex + 1) % texts.length;
                    setTimeout(type, 400);    // 다음 문장 전 잠깐 대기
                    return;
                }
            }
            setTimeout(type, isDeleting ? 50 : 80);
        }

        type();

        // 맨 위로 버튼
        const scrollTopBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', () => {
            scrollTopBtn.classList.toggle('visible', window.scrollY > 300);
        });
        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // 활동 통계
        fetch('/api/stats').then(r => r.json()).then(data => {
            document.getElementById('statUsers').textContent = data.users ?? '-';
            document.getElementById('statProfiles').textContent = data.profiles ?? '-';
        }).catch(() => {});

        // 닉네임 검색
        const searchInput  = document.getElementById('searchInput');
        const searchDropdown = document.getElementById('searchDropdown');
        let searchTimer = null;

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
        function highlight(text, q) {
            const escaped = escapeHtml(text);
            const pattern = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
            return escaped.replace(pattern, '<mark>$1</mark>');
        }
        function closeSearchDrop() {
            searchDropdown.classList.add('hidden');
        }
        function renderSearchDrop(results, q) {
            if (!results.length) {
                searchDropdown.innerHTML = '<div class="search-drop-empty">검색 결과가 없습니다</div>';
            } else {
                searchDropdown.innerHTML = '';
                results.forEach(u => {
                    const row = document.createElement('div');
                    row.className = 'search-drop-row';
                    const avatarColor = ['#667eea','#f093fb','#4facfe','#43e97b','#fa709a'][u.nickname.charCodeAt(0) % 5];
                    row.innerHTML = `
                        <div class="search-drop-avatar" style="background:${avatarColor};">${escapeHtml(u.nickname.charAt(0))}</div>
                        <div class="search-drop-info">
                            <div class="search-drop-name">${highlight(u.nickname, q)}</div>
                            <div class="search-drop-sub">구인 게시판 보기 →</div>
                        </div>`;
                    row.addEventListener('click', () => {
                        window.location.href = '/recruit';
                    });
                    searchDropdown.appendChild(row);
                });
            }
            searchDropdown.classList.remove('hidden');
        }

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim();
            clearTimeout(searchTimer);
            if (!q) { closeSearchDrop(); return; }
            searchTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                    const data = await res.json();
                    renderSearchDrop(data.results, q);
                } catch { closeSearchDrop(); }
            }, 180);
        });
        searchInput.addEventListener('keydown', e => {
            if (e.key === 'Escape') { searchInput.value = ''; closeSearchDrop(); }
        });
        document.addEventListener('click', e => {
            if (!document.getElementById('searchWrap').contains(e.target)) closeSearchDrop();
        });

        // 다크모드 토글
        const darkToggle = document.getElementById('darkToggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            darkToggle.textContent = '☀️';
        }
        darkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            darkToggle.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // ── 새 글 배지 ──
        (async () => {
            try {
                const data = await fetch('/api/new-activity').then(r => r.json());
                const lastRecruit = parseFloat(localStorage.getItem('lastVisitRecruit') || '0');
                const lastNotice  = parseFloat(localStorage.getItem('lastVisitNotice')  || '0');

                if (data.profile_latest > lastRecruit) {
                    document.getElementById('dotRecruit').classList.remove('hidden');
                    document.getElementById('btnDotRecruit').classList.remove('hidden');
                }
                if (data.notice_latest > lastNotice) {
                    document.getElementById('dotNotice').classList.remove('hidden');
                    document.getElementById('btnDotNotice').classList.remove('hidden');
                }
            } catch {}
        })();

        // 링크 클릭 시 방문 시각 기록
        document.getElementById('navRecruit').addEventListener('click', () => localStorage.setItem('lastVisitRecruit', Date.now() / 1000));
        document.getElementById('navNotice').addEventListener('click',  () => localStorage.setItem('lastVisitNotice',  Date.now() / 1000));
        document.getElementById('btnRecruit').addEventListener('click', () => localStorage.setItem('lastVisitRecruit', Date.now() / 1000));
        document.getElementById('btnNotice').addEventListener('click',  () => localStorage.setItem('lastVisitNotice',  Date.now() / 1000));
    </script>
</body>
</html>
