<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- [수정 4] CSS 경로 ../static/ → /static/ (Flask 템플릿에서 상대경로 ../static/ 작동 안 함) -->
    <link rel="stylesheet" href="/static/css/login.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <title>Document</title>
</head>
<body>
    <div class="toast" id="toast">✅ 로그인에 성공했습니다!</div>
    <box>
        <form action="/login" method="POST" >
        <div class="login">
            <h2 class="gg">로그인</h2>
            <div class="email-wrapper">
                    <!-- [수정 5] id="emailId" → id="email" (login.js의 getElementById('email')과 일치시킴) -->
                    <input type="text" placeholder="이메일 아이디" class="email" id="email" oninput="formatEmail()" name="email">
                    <span class="email-domain">@gmail.com</span>
            </div>

            <div class="password-wrapper">
                <input type="text" placeholder="비밀번호를 입력하세요" class="password" id="pw1" name="password">
                <i class="fi fi-sr-eye-crossed toggle-pw" id="togglePw1" onclick="togglePassword('pw1', 'togglePw1')"></i>
            </div>

            <button class="enter">로그인</button>
            <div class="first-login">
                <a class="first-login-font" href="/signup">회원가입</a>
                <span class="divider">|</span>
                <a class="first-login-font" href="/forgot_password">비밀번호 찾기</a>
            </div>
        </div>
        </form>

    </box>

    <!-- [수정 6] JS 경로 ../static/ → /static/ -->
    <script src="/static/js/login.js"></script>
    <script>
        {% if show_toast %}
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
        {% endif %}
    </script>
</body>
</html>
